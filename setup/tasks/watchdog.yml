# Watchdog: GET /api/health and restart flock-you-api on failure
- name: Install watchdog script
  ansible.builtin.template:
    src: watchdog_api.sh.j2
    dest: /usr/local/bin/flock-you-watchdog.sh
    mode: "0755"
  tags: [templates]

- name: Create watchdog timer and service
  ansible.builtin.template:
    src: flock_you_watchdog.service.j2
    dest: /etc/systemd/system/flock-you-watchdog.service
    mode: "0644"
  tags: [templates]

- name: Install watchdog timer
  ansible.builtin.copy:
    content: |
      [Unit]
      Description=Run Flock You API watchdog every minute
      [Timer]
      OnBootSec=1min
      OnUnitActiveSec=1min
      [Install]
      WantedBy=timers.target
    dest: /etc/systemd/system/flock-you-watchdog.timer
    mode: "0644"

- name: Enable and start watchdog timer
  ansible.builtin.systemd:
    name: flock-you-watchdog.timer
    state: started
    enabled: true
    daemon_reload: true
