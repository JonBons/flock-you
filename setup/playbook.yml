---
# Flock You - Raspberry Pi Zero 2 W full setup
# Prerequisites: Pi on network, SSH + user, inventory set. Then:
#   cd setup && ansible-playbook -i inventory.yml playbook.yml
- name: Serial, PPS, gpsd, chrony
  hosts: all
  become: true
  handlers:
    - name: restart gpsd
      ansible.builtin.systemd:
        name: gpsd
        state: restarted
    - name: restart chrony
      ansible.builtin.systemd:
        name: chrony
        state: restarted
      when: not serial_pps_rebooting | default(false)
  tasks:
    - ansible.builtin.include_tasks: tasks/serial_pps.yml

- name: Wait for Pi after reboot
  hosts: all
  gather_facts: false
  tasks:
    - ansible.builtin.wait_for_connection:
        timeout: 120

- name: App deploy, systemd, Caddy, watchdog, button/AP, timezone
  hosts: all
  become: true
  vars:
    reboot_after_setup: true   # override: -e reboot_after_setup=false to skip final reboot
  tasks:
    - ansible.builtin.include_tasks: tasks/app_deploy.yml
    - ansible.builtin.include_tasks: tasks/caddy.yml
    - ansible.builtin.include_tasks: tasks/watchdog.yml
    - ansible.builtin.include_tasks: tasks/button_ap.yml
    - name: Reboot to apply all services
      ansible.builtin.reboot:
        msg: "Flock You setup complete"
        connect_timeout: 5
        reboot_timeout: 120
      when: reboot_after_setup | default(true) | bool
